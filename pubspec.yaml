name: rizznight
description: Rizznight Running Club - We Don't Run. We Rave.
publish_to: 'none'
version: 1.0.0+1

environment:
    sdk: '>=3.2.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # Routing
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.3.3
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
